version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpl
      POSTGRES_USER: rpl
      POSTGRES_PASSWORD: rpl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rpl
      SPRING_DATASOURCE_USERNAME: rpl
      SPRING_DATASOURCE_PASSWORD: rpl
    depends_on:
      - db

volumes:
  pgdata: