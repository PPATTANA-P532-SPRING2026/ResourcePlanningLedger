name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rpl
          POSTGRES_USER: rpl
          POSTGRES_PASSWORD: rpl
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn -q test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/rpl
          SPRING_DATASOURCE_USERNAME: rpl
          SPRING_DATASOURCE_PASSWORD: rpl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-report
          path: target/surefire-reports/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn -q package -DskipTests
      - run: docker build -t rpl .

  deploy-backend-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render production deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  deploy-backend-week2:
    needs: build
    if: github.ref == 'refs/heads/week-2-changes'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render week2 deploy
        run: curl -X POST ${{ secrets.RENDER_WEEK2_DEPLOY_HOOK }}

  deploy-frontend-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject production backend API URL
        run: |
          sed -i 's|var API = ".*";|var API = "${{ secrets.RENDER_BACKEND_URL }}";|' src/main/resources/static/js/app.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/main/resources/static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-frontend-week2:
    needs: build
    if: github.ref == 'refs/heads/week-2-changes'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages-week2
      url: ${{ steps.deployment-week2.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject week2 backend API URL
        run: |
          sed -i 's|var API = ".*";|var API = "${{ secrets.RENDER_WEEK2_BACKEND_URL }}";|' src/main/resources/static/js/app.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/main/resources/static

      - name: Deploy to GitHub Pages
        id: deployment-week2
        uses: actions/deploy-pages@v4