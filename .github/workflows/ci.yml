name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # Job 1: Run unit tests with PostgreSQL service container
  # ============================================================
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rpl
          POSTGRES_USER: rpl
          POSTGRES_PASSWORD: rpl
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn -q test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/rpl
          SPRING_DATASOURCE_USERNAME: rpl
          SPRING_DATASOURCE_PASSWORD: rpl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-report
          path: target/surefire-reports/

  # ============================================================
  # Job 2: Build JAR and Docker image
  # ============================================================
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn -q package -DskipTests
      - run: docker build -t rpl .

  # ============================================================
  # Job 3: Deploy backend to Render (main branch only)
  # ============================================================
  deploy-backend:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  # ============================================================
  # Job 4: Deploy frontend to GitHub Pages (main branch only)
  # ============================================================
  deploy-frontend:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # Replace the API placeholder in app.js with the actual Render URL
      - name: Inject backend API URL
        run: |
          sed -i "s|const API = '.*';|const API = '${{ secrets.RENDER_BACKEND_URL }}';|" src/main/resources/static/js/app.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # Upload only the static/ folder (index.html, css/, js/)
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/main/resources/static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4